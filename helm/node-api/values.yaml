replicaCount: 2

image:
  repository: smaitic-node-api
  tag: local
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

config:
  nodeEnv: production
  port: 3000

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  host: node-api.example.com
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
  
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

metrics:
  enabled: true
  path: /metrics
  portName: api-web