apiVersion: v1
kind: Service
metadata:
  name: {{ include "node-api.fullname" . }}
  labels:
    {{- include "node-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: {{ .Values.config.portName }}
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.config.portName }}
      protocol: TCP
  selector:
    {{- include "node-api.selectorLabels" . | nindent 4 }}